<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>Portfolio</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>
    <div class="container mt-4">

        <h1>My Investments</h1>

        <p>Remaining Fund: $<span th:text="${remaining}"></span></p>

        <!-- SORT -->
        <a href="/investments/?sort=amountAsc" class="me-2">Amount ↑</a>
        <a href="/investments/?sort=amountDesc" class="me-2">Amount ↓</a>
        <a href="/investments/?sort=nameAsc" class="me-2">Name ↑</a>
        <a href="/investments/?sort=nameDesc" class="me-2">Name ↓</a>

        <table class="table mt-3">
            <tr>
            <a th:href="@{/investments/}" class="btn btn-primary">Go to Investments</a>
                <th>ID</th>
                <th>Name</th>
                <th>Amount</th>
                <th>Action</th>
            </tr>

            <tr th:each="inv : ${investments}">
                <td th:text="${inv.id}"></td>
                <td>
                    <a th:href="@{/investments/{id}(id=${inv.id})}" th:text="${inv.name}"></a>
                </td>
                <td th:text="${inv.amount}"></td>
                <td>
   					 <a th:href="@{/investments/edit/{id}(id=${inv.id})}" class="btn btn-sm btn-warning">Edit</a>
    				 <a th:href="@{/investments/{id}(id=${inv.id})}" class="btn btn-sm btn-primary">View Details</a>

    				<form th:action="@{/investments/delete/{id}(id=${inv.id})}" method="post" style="display:inline;">
        					<button type="submit" class="btn btn-sm btn-danger">Delete</button>
    				</form>
				</td>
            </tr>
        </table>

        <!-- ADD -->
        <h3>Add Investment</h3>
        <form th:action="@{/investments}" method="post">
            <input name="name" class="form-control mb-2" placeholder="Name">
            <input name="amount" type="number" class="form-control mb-2" placeholder="Amount">
            <input name="description" class="form-control mb-2" placeholder="Description (optional)">
            <button class="btn btn-primary">Add</button>
        </form>

        <!-- ADD TO FUND -->
        <h3>Add to Fund</h3>
        <form th:action="@{/investments/fund}" method="post">
            <input name="amount" type="number" class="form-control mb-2" placeholder="Amount">
            <button class="btn btn-success">Add to Fund</button>
        </form>

    </div>
</body>

</html>
