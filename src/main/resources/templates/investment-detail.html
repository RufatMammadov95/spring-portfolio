<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>Investment Detail</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>
<div class="container mt-4">
    <h1>Investment Detail</h1>

    <div class="card p-4 mb-3">
        <h3 th:text="${investment.name}"></h3>
        <p><strong>Amount:</strong> $<span th:text="${investment.amount}"></span></p>
        <p><strong>Description:</strong> <span th:text="${investment.description} ?: 'No description'"></span></p>
    </div>

    <a th:href="@{/investments/}" class="btn btn-secondary">Back</a>
    <a th:href="@{/investments/edit/{id}(id=${investment.id})}" class="btn btn-warning">Edit</a>
    <form th:action="@{/investments/delete/{id}(id=${investment.id})}" method="post" style="display:inline;">
    <button type="submit" class="btn btn-danger">Delete</button>
	</form>
</div>
</body>
</html>
