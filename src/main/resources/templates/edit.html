<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>Edit Investment</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>
<div class="container mt-4">
    <h2>Edit Investment</h2>

    <form th:action="@{/investments/update}" method="post">
        <input type="hidden" name="id" th:value="${investment.id}">

        <label>Name:</label>
        <input name="name" th:value="${investment.name}" class="form-control mb-2">

        <label>Amount:</label>
        <input name="amount" type="number" th:value="${investment.amount}" class="form-control mb-2">

        <label>Description (optional):</label>
        <input name="description" type="text" th:value="${investment.description}" class="form-control mb-2">

        <button class="btn btn-primary">Update</button>
        <a th:href="@{/investments/}" class="btn btn-secondary">Back</a>
    </form>
</div>
</body>
</html>
